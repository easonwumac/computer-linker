name: CI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  product-check:
    name: Windows / Node 22
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm

      - name: Install
        run: npm ci

      - name: Product Check
        run: npm run product:check
